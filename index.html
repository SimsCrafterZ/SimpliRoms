<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpliRoms</title>

  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      color:#aaa;
      margin-bottom:25px;
    }

    #search{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      margin-bottom:25px;
      font-size:18px;
      background:#222;
      color:white;
      box-sizing:border-box;
    }

    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#222;
      border-radius:18px;
      overflow:hidden;
      padding:12px;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.02);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:12px;
    }

    .console{
      color:#999;
      margin-top:-8px;
      margin-bottom:15px;
    }

    .download{
      display:block;
      background:#00aa44;
      text-align:center;
      padding:12px;
      border-radius:12px;
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    .download:hover{
      background:#00cc55;
    }
  </style>
</head>
<body>

<h1>SimpliRoms</h1>
<p>
<a href="https://example.com">game ROM request</a></p>

<input
  type="text"
  id="search"
  placeholder="Search for a game..."
>

<div class="games" id="games"></div>

<script>
let allGames = [];

async function loadGames(){
  const response = await fetch('games.json');
  allGames = await response.json();

  displayGames(allGames);
}

function displayGames(games){
  const container = document.getElementById('games');

  container.innerHTML = '';

  games.forEach(game => {
    container.innerHTML += `
      <div class="card">
        <img src="${game.image}" alt="${game.title}">

        <h2>${game.title}</h2>

        <div class="console">
          ${game.console}
        </div>

        <a
          class="download"
          href="${game.rom}"
          download
        >
          download 
        </a>
      </div>
    `;
  });
}

const search = document.getElementById('search');

search.addEventListener('input', () => {
  const value = search.value.toLowerCase();

  const filtered = allGames.filter(game =>
    game.title.toLowerCase().includes(value)
  );

  displayGames(filtered);
});

loadGames();
</script>

</body>
</html>
